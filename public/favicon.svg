<svg xmlns="http://www.w3.org/2000/svg" width="32" height="39" viewBox="0 0 56 68">
  <!-- Blue court mark — real ITF proportions -->
  <rect x="0" y="0" width="56" height="68" rx="10" fill="#3b82f6"/>
  <!-- Outer court boundary -->
  <rect x="5" y="5" width="46" height="58" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Left singles line (alley) -->
  <line x1="11" y1="5"  x2="11" y2="63" stroke="white" stroke-width="1.2"/>
  <!-- Right singles line (alley) -->
  <line x1="45" y1="5"  x2="45" y2="63" stroke="white" stroke-width="1.2"/>
  <!-- NET — bold -->
  <line x1="5"  y1="34" x2="51" y2="34" stroke="white" stroke-width="3"/>
  <!-- Service line top -->
  <line x1="11" y1="18" x2="45" y2="18" stroke="white" stroke-width="1.2"/>
  <!-- Service line bottom -->
  <line x1="11" y1="50" x2="45" y2="50" stroke="white" stroke-width="1.2"/>
  <!-- Centre service line -->
  <line x1="28" y1="18" x2="28" y2="50" stroke="white" stroke-width="1.2"/>
  <!-- Centre marks at baselines -->
  <line x1="28" y1="5"  x2="28" y2="10" stroke="white" stroke-width="1.2"/>
  <line x1="28" y1="58" x2="28" y2="63" stroke="white" stroke-width="1.2"/>
</svg>
